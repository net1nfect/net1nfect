<svg width="900" height="150" viewBox="0 0 900 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="soft-noise" x="-10%" y="-20%" width="120%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="13" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="screen"/>
    </filter>

    <clipPath id="slice-a">
      <rect x="0" y="42" width="900" height="12">
        <animate attributeName="y" values="42;42;87;42" keyTimes="0;0.72;0.75;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>

    <clipPath id="slice-b">
      <rect x="0" y="96" width="900" height="7">
        <animate attributeName="y" values="96;96;58;96" keyTimes="0;0.82;0.85;1" dur="9s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="900" height="150" fill="#0d1117"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="64" font-weight="500" letter-spacing="12" text-anchor="middle">
    <text x="450" y="96" fill="#e6edf3">net1nfect</text>

    <text x="446" y="96" fill="#8c959f" opacity="0" clip-path="url(#slice-a)">
      net1nfect
      <animate attributeName="opacity" values="0;0;0.45;0" keyTimes="0;0.72;0.74;1" dur="7s" repeatCount="indefinite"/>
    </text>

    <text x="454" y="96" fill="#ffffff" opacity="0" clip-path="url(#slice-b)">
      net1nfect
      <animate attributeName="opacity" values="0;0;0.32;0" keyTimes="0;0.82;0.84;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect x="730" y="107" width="6" height="6" rx="3" fill="#8c959f">
    <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <line x1="260" y1="122" x2="640" y2="122" stroke="#30363d" stroke-width="1"/>
</svg>
